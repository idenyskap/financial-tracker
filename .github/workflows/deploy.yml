name: Deploy to AWS EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build backend
        run: mvn clean package -DskipTests

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: http://13.48.198.125/api/v1
        run: |
          npm ci
          npm run build

      - name: Deploy to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/financial_tracker-0.0.1-SNAPSHOT.jar,frontend/dist/*"
          target: "/home/ubuntu/deploy"

      - name: Restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cp /home/ubuntu/deploy/target/financial_tracker-0.0.1-SNAPSHOT.jar /home/ubuntu/app.jar
            sudo rm -rf /var/www/html/*
            sudo cp -r /home/ubuntu/deploy/frontend/dist/* /var/www/html/
            rm -rf /home/ubuntu/deploy
            sudo systemctl restart financial-tracker