server:
  forward-headers-strategy: framework

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: false
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/postgres}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  logging:
    level:
      com.example.financial_tracker: DEBUG
      org.springframework.security: DEBUG
      org.springframework.web: DEBUG
      com.example.financial_tracker.service.TwoFactorAuthService: DEBUG
      com.example.financial_tracker.service.CurrencyService: DEBUG
  security:
    method:
      secured-annotations: enabled
      pre-post-annotations: enabled
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: email, profile
  jackson:
    serialization:
      write-dates-as-timestamps: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
    default-encoding: UTF-8
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  cookie:
    max-age: 86400
    secure: false
    path: /
    http-only: true
  mail:
    from: noreply@financetracker.com
    from-name: Finance Tracker
    base-url: http://localhost:3000
    quota:
      enabled: false
      daily-limit: 450
      monthly-limit: 13500
      hourly-limit: 20

jwt:
  secret: ${JWT_SECRET:qW3rTy8iOp2sD4fG6hJ9kL1zX3cV5bN7mQ0wE2rT4yU6iO8pA1sD3fG5hJ7kL9zX1cV3bN5m}
  expiration: 86400000

aws:
  access-key-id: ${AWS_ACCESS_KEY_ID:}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
  region: ${AWS_REGION:eu-north-1}
  s3:
    bucket-name: ${AWS_S3_BUCKET:financial-tracker-files-idenyskap}
